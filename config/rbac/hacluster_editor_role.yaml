# This rule is not used by the project cnpg-ha itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the ha.cnpg.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cnpg-ha
    app.kubernetes.io/managed-by: kustomize
  name: hacluster-editor-role
rules:
- apiGroups:
  - ha.cnpg.io
  resources:
  - haclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ha.cnpg.io
  resources:
  - haclusters/status
  verbs:
  - get
