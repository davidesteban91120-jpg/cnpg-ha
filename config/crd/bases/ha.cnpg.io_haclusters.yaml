---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: haclusters.ha.cnpg.io
spec:
  group: ha.cnpg.io
  names:
    kind: HACluster
    listKind: HAClusterList
    plural: haclusters
    shortNames:
    - hac
    - hacluster
    singular: hacluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.currentPrimarySite
      name: Primary
      type: string
    - jsonPath: .status.conditions[?(@.type=="Available")].status
      name: Available
      type: string
    - jsonPath: .spec.failover.mode
      name: Mode
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          HACluster orchestrates the cross-cluster failover of a group of CNPG
          Clusters.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state.
            properties:
              failover:
                description: 'Failover: failover decision parameters.'
                properties:
                  failureThreshold:
                    default: 3
                    description: |-
                      FailureThreshold: number of consecutive failed probes before the
                      primary is considered down. Always greater than 1 so a transient
                      network blip cannot trigger a failover.
                    format: int32
                    maximum: 20
                    minimum: 2
                    type: integer
                  healthCheckIntervalSeconds:
                    default: 10
                    description: |-
                      HealthCheckIntervalSeconds: period between two primary probes.
                      10 s is a good starting point — too short causes flapping, too long
                      degrades the RTO.
                    format: int32
                    maximum: 300
                    minimum: 1
                    type: integer
                  mode:
                    default: Manual
                    description: 'Mode: Automatic or Manual. See FailoverMode.'
                    enum:
                    - Automatic
                    - Manual
                    type: string
                  promotionPolicy:
                    default: MostAdvancedLSN
                    description: 'PromotionPolicy: see PromotionPolicy.'
                    enum:
                    - MostAdvancedLSN
                    - Ordered
                    type: string
                  rejoinPolicy:
                    default: Manual
                    description: |-
                      RejoinPolicy controls what happens to a former primary that comes
                      back while another site is the current primary. See RejoinPolicy.
                    enum:
                    - Manual
                    - AutoReplica
                    type: string
                type: object
              primary:
                description: 'Primary: site currently serving writes.'
                properties:
                  clusterRef:
                    description: |-
                      ClusterRef points to the CNPG Cluster CR for the local / bootstrap
                      site. It serves as the primary at startup; after a failover the
                      current primary may be any of the sites listed in Spec.Replicas.
                    properties:
                      name:
                        description: Name of the CNPG Cluster CR.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace of the CNPG Cluster CR.
                        minLength: 1
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  name:
                    description: |-
                      Name is the logical identifier of the local / bootstrap site
                      (e.g. "site-a"). Same semantics as ReplicaSite.Name — it may be the
                      initial value of status.currentPrimarySite and is used as a key in
                      the metrics. Must be unique within the HACluster (do not reuse a
                      replica name).
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  postgresProbe:
                    description: |-
                      PostgresProbe optionally enables a direct PostgreSQL WAL-location probe
                      for this site.
                    properties:
                      database:
                        default: postgres
                        description: Database is the database used for the probe query.
                        type: string
                      endpoint:
                        description: |-
                          Endpoint is the PostgreSQL host (optionally host:port) used for the
                          probe. When empty, the site's replicationEndpoint is used.
                        type: string
                      passwordSecretRef:
                        description: |-
                          PasswordSecretRef points to the key containing the PostgreSQL password.
                          The Secret is read in the CNPG Cluster namespace of that site.
                        properties:
                          key:
                            description: The key of the secret to select from.  Must
                              be a valid secret key.
                            type: string
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: Specify whether the Secret or its key must
                              be defined
                            type: boolean
                        required:
                        - key
                        type: object
                        x-kubernetes-map-type: atomic
                      port:
                        default: 5432
                        description: Port is the PostgreSQL port used when endpoint
                          has no explicit port.
                        format: int32
                        maximum: 65535
                        minimum: 1
                        type: integer
                      sslMode:
                        default: require
                        description: |-
                          SSLMode is passed to the PostgreSQL client. Common values are disable,
                          require, verify-ca, and verify-full.
                        enum:
                        - disable
                        - allow
                        - prefer
                        - require
                        - verify-ca
                        - verify-full
                        type: string
                      userSecretRef:
                        description: |-
                          UserSecretRef points to the key containing the PostgreSQL username.
                          The Secret is read in the CNPG Cluster namespace of that site.
                        properties:
                          key:
                            description: The key of the secret to select from.  Must
                              be a valid secret key.
                            type: string
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: Specify whether the Secret or its key must
                              be defined
                            type: boolean
                        required:
                        - key
                        type: object
                        x-kubernetes-map-type: atomic
                    required:
                    - passwordSecretRef
                    - userSecretRef
                    type: object
                  replicationEndpoint:
                    description: |-
                      ReplicationEndpoint is the host (optionally host:port) that the OTHER
                      sites use to stream WAL from this site when it is the current primary.
                      Typically the CNPG read-write Service FQDN
                      (e.g. "pg-prod-rw.site-a.svc.cluster.local"); in a Cilium Cluster Mesh
                      deployment, the global service name.

                      When set, after a failover the operator rewrites every other site's
                      spec.replica externalCluster host to the new primary's endpoint so
                      surviving replicas follow the promotion automatically. When empty,
                      topology reconfiguration is skipped (the operator only observes).
                    type: string
                required:
                - clusterRef
                - name
                type: object
              replicas:
                description: 'Replicas: remote sites ready to be promoted.'
                items:
                  description: ReplicaSite describes a remote CNPG cluster acting
                    as a replica.
                  properties:
                    clusterRef:
                      description: ClusterRef points to the CNPG Cluster CR inside
                        the remote cluster.
                      properties:
                        name:
                          description: Name of the CNPG Cluster CR.
                          minLength: 1
                          type: string
                        namespace:
                          description: Namespace of the CNPG Cluster CR.
                          minLength: 1
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                    kubeconfigSecretRef:
                      description: |-
                        KubeconfigSecretRef points to a Secret in the local cluster that
                        holds the kubeconfig used to connect to the remote cluster. The
                        operator reads the Secret at startup and refreshes it on an internal
                        TTL.

                        Security: the key referenced here MUST NEVER be logged. See
                        internal/remoteclient for the redaction logic.
                      properties:
                        key:
                          description: The key of the secret to select from.  Must
                            be a valid secret key.
                          type: string
                        name:
                          default: ""
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        optional:
                          description: Specify whether the Secret or its key must
                            be defined
                          type: boolean
                      required:
                      - key
                      type: object
                      x-kubernetes-map-type: atomic
                    name:
                      description: |-
                        Name is the logical identifier of the site (e.g. "site-b"). Must be
                        stable and unique within the HACluster — it is used as a key in the
                        status and in Prometheus metrics.
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    postgresProbe:
                      description: |-
                        PostgresProbe optionally enables a direct PostgreSQL WAL-location probe
                        for this site.
                      properties:
                        database:
                          default: postgres
                          description: Database is the database used for the probe
                            query.
                          type: string
                        endpoint:
                          description: |-
                            Endpoint is the PostgreSQL host (optionally host:port) used for the
                            probe. When empty, the site's replicationEndpoint is used.
                          type: string
                        passwordSecretRef:
                          description: |-
                            PasswordSecretRef points to the key containing the PostgreSQL password.
                            The Secret is read in the CNPG Cluster namespace of that site.
                          properties:
                            key:
                              description: The key of the secret to select from.  Must
                                be a valid secret key.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the Secret or its key must
                                be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                        port:
                          default: 5432
                          description: Port is the PostgreSQL port used when endpoint
                            has no explicit port.
                          format: int32
                          maximum: 65535
                          minimum: 1
                          type: integer
                        sslMode:
                          default: require
                          description: |-
                            SSLMode is passed to the PostgreSQL client. Common values are disable,
                            require, verify-ca, and verify-full.
                          enum:
                          - disable
                          - allow
                          - prefer
                          - require
                          - verify-ca
                          - verify-full
                          type: string
                        userSecretRef:
                          description: |-
                            UserSecretRef points to the key containing the PostgreSQL username.
                            The Secret is read in the CNPG Cluster namespace of that site.
                          properties:
                            key:
                              description: The key of the secret to select from.  Must
                                be a valid secret key.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the Secret or its key must
                                be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                      required:
                      - passwordSecretRef
                      - userSecretRef
                      type: object
                    replicationEndpoint:
                      description: |-
                        ReplicationEndpoint is the host (optionally host:port) that the OTHER
                        sites use to stream WAL from this site once it has been promoted to
                        primary. Same semantics as PrimarySite.ReplicationEndpoint. Required
                        for this site to be eligible as an automatic-reconfiguration target
                        after a failover; when empty, other sites cannot be re-pointed here.
                      type: string
                  required:
                  - clusterRef
                  - kubeconfigSecretRef
                  - name
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            required:
            - primary
            - replicas
            type: object
          status:
            description: Status reflects the observed state.
            properties:
              conditions:
                description: |-
                  Conditions: state of the functional aspects of the HACluster.
                  Expected types: "Available", "Progressing", "Degraded",
                  "FailoverInProgress".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentPrimarySite:
                description: |-
                  CurrentPrimarySite: name of the last site accepted as primary by the
                  operator. On a failover, this field is updated AFTER the CNPG-side
                  promotion has happened (never before). If that site becomes
                  transiently unhealthy, the field stays set and the unavailability is
                  surfaced through the conditions.
                type: string
              lastFailoverTime:
                description: 'LastFailoverTime: timestamp of the last successful failover.'
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration: metadata.generation processed by the last
                  Reconcile. Tells callers whether the status reflects the current spec.
                format: int64
                type: integer
              sites:
                description: |-
                  Sites: per-site detailed observation (primary + replicas). Enables
                  quick inspection via
                  `kubectl get hacluster -o jsonpath='{.status.sites}'` and underpins
                  the promotion logic.
                items:
                  description: |-
                    SiteStatus exposes the observation of a site (primary or replica)
                    captured during the last Reconcile. It supports quick inspection via
                    kubectl and is the basis for the promotion logic that consults the
                    state of each candidate.
                  properties:
                    currentLSN:
                      description: |-
                        CurrentLSN is the WAL location observed through the optional PostgreSQL
                        probe. It is empty when postgresProbe is not configured or when the
                        probe failed.
                      type: string
                    lastObservedTime:
                      description: |-
                        LastObservedTime is the timestamp of the Reconcile that produced
                        this observation. Updated on every pass, even without a state change.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        Message carries a free-form detail — typically the reason for a
                        failure (invalid kubeconfig, K8s Get error, readyInstances=0). Empty
                        when the site is reachable and ready.
                      type: string
                    name:
                      description: |-
                        Name is the logical identifier of the site, consistent with
                        spec.primary.name or spec.replicas[].name.
                      type: string
                    phase:
                      description: |-
                        Phase mirrors status.phase of the CNPG Cluster CR (e.g. "Cluster in
                        healthy state"). Empty if the site is unreachable.
                      type: string
                    reachable:
                      description: |-
                        Reachable indicates whether the site's K8s API responded during the
                        last Reconcile.
                      type: boolean
                    ready:
                      description: |-
                        Ready indicates whether the site's CNPG Cluster CR has at least one
                        ready instance (status.readyInstances > 0).
                      type: boolean
                    replicationLagMilliseconds:
                      description: |-
                        ReplicationLagMilliseconds is the replay lag observed through the
                        optional PostgreSQL probe. Primary sites report 0. It is omitted when
                        the probe is not configured or the lag cannot be computed yet.
                      format: int64
                      type: integer
                    role:
                      description: Role observed for the site during the last Reconcile.
                      enum:
                      - Primary
                      - Replica
                      - Unknown
                      type: string
                  required:
                  - name
                  - reachable
                  - ready
                  - role
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
