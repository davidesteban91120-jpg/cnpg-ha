# Code-level supply-chain scans.
# - govulncheck   : Go vulnerability DB (sources + binaries)
# - gosec         : Go SAST
# - osv-scanner   : cross-ecosystem CVE scan (Go, GHA, Dockerfile)
# - gitleaks      : secret scanning across full git history
# - trivy fs      : filesystem scan (catches misconfig in YAML/Helm too)
#
# All findings upload SARIF to the GitHub Security tab so they show up in
# the "Code scanning alerts" view and on the PR.
name: code-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Re-scan every Monday at 06:00 UTC to catch CVEs published against
    # code that has not changed since the last commit.
    - cron: "0 6 * * 1"

concurrency:
  group: code-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          repo-checkout: false

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out gosec.sarif ./..."
      - name: Upload gosec SARIF
        # GitHub Code Scanning requires either a public repo or GitHub Advanced
        # Security on private repos. Skip the upload on private repos so the
        # scan still runs (findings appear in the job log) but the job stays
        # green. Drop the `if:` once the repo is public or GHAS is enabled.
        if: ${{ !github.event.repository.private }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec
      - name: Upload gosec SARIF (artifact, private-repo fallback)
        if: ${{ github.event.repository.private }}
        uses: actions/upload-artifact@v4
        with:
          name: gosec-sarif
          path: gosec.sarif
          if-no-files-found: ignore

  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run osv-scanner
        # --no-call-analysis=go disables the embedded govulncheck pass.
        # osv-scanner v2.0.0 ships Go 1.23 in its container; with our go.mod
        # toolchain directive at 1.25+ the call-analysis pass crashes
        # ('go.mod requires go >= 1.25.7 (running go 1.23.7; GOTOOLCHAIN=local)').
        # We run govulncheck in a dedicated job above with the right Go
        # version, so the duplication is unnecessary.
        # Note: --call-analysis=none does NOT work — 'none' is parsed as a
        # language name and Go remains enabled by default.
        uses: google/osv-scanner-action/osv-scanner-action@v2.0.0
        with:
          scan-args: |-
            --recursive
            --no-call-analysis=go
            --format=sarif
            --output=osv.sarif
            ./
      - name: Upload osv-scanner SARIF
        if: ${{ always() && !github.event.repository.private }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv.sarif
          category: osv-scanner
      - name: Upload osv-scanner SARIF (artifact, private-repo fallback)
        if: ${{ always() && github.event.repository.private }}
        uses: actions/upload-artifact@v4
        with:
          name: osv-sarif
          path: osv.sarif
          if-no-files-found: ignore

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read  # gitleaks-action lists PR commits to scan the diff
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — gitleaks scans every commit.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For private repos, set GITLEAKS_LICENSE in repo secrets.

  trivy-fs:
    name: trivy fs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Scan filesystem + IaC + Helm
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "1"
      - name: Upload trivy fs SARIF
        if: ${{ always() && !github.event.repository.private }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      - name: Upload trivy fs SARIF (artifact, private-repo fallback)
        if: ${{ always() && github.event.repository.private }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          if-no-files-found: ignore
