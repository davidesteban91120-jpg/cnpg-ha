# Build, scan, push, and sign the controller container image.
#
# Triggers:
#   - pull_request → build only (no push), Trivy scan local image.
#   - push to main → build + push :main + :sha-XXXXXXX, sign + SBOM + SLSA prov.
#   - tag v*       → build + push semver tags, sign + SBOM + SLSA prov.
#
# Outputs published to ghcr.io/<owner>/cnpg-ha:
#   <tag>                              the image manifest
#   <tag>.sig                          Cosign keyless signature (Rekor logged)
#   <tag>.att                          Cosign attestation (SBOM SPDX-JSON)
#   <tag>.intoto.jsonl                 SLSA L3 provenance attestation
#
# Verify after release:
#   cosign verify ghcr.io/<owner>/cnpg-ha:<tag> \
#     --certificate-identity-regexp "^https://github.com/<owner>/cnpg-ha/" \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
name: image-build-sign

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # ghcr push
      id-token: write       # cosign keyless OIDC
      security-events: write
      attestations: write   # actions/attest-build-provenance
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go (for go.sum check)
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.sum is tidy
        run: |
          go mod tidy -diff

      - name: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + OCI labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=cnpg-ha
            org.opencontainers.image.description=Multi-site failover operator for CloudNativePG
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=davidesteban

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          # On pull_request we build a single-arch amd64 image and --load it so
          # Trivy can scan it locally; --load cannot export a multi-arch
          # manifest list, and the docker exporter supports neither provenance
          # nor SBOM attestations. The push path keeps the full multi-arch +
          # attested build.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: ${{ always() && !github.event.repository.private }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Upload Trivy SARIF (artifact, private-repo fallback)
        if: ${{ always() && github.event.repository.private }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif
          if-no-files-found: ignore

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Cosign sign (keyless, Fulcio + Rekor)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Generate SBOM (SPDX-JSON)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-release-assets: ${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Cosign attest SBOM
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign attest --yes \
              --predicate sbom.spdx.json \
              --type spdxjson \
              "${tag}@${DIGEST}"
          done

  provenance:
    name: SLSA L3 provenance
    needs: [build]
    if: github.event_name != 'pull_request'
    permissions:
      actions: read
      contents: write       # upload provenance to release if on tag
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
      # Opt-in for private repositories. Without this the generator refuses
      # to download its signed builder binary (`slsa-generator-container-
      # linux-amd64`) and the "final" status step exits 27. Note that the
      # provenance attestation will still be logged to the public Rekor
      # transparency log together with the repository name and workflow
      # path — this flag is the explicit acknowledgement of that.
      private-repository: true
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
