# Build, scan, push, and sign the controller container image.
#
# Triggers:
#   - pull_request → build only (no push), Trivy scan local image.
#   - push to main → build + push :main + :sha-XXXXXXX, sign + SBOM + SLSA prov.
#   - tag v*       → build + push semver tags, sign + SBOM + SLSA prov.
#
# Outputs published to ghcr.io/<owner>/cnpg-ha:
#   <tag>                              the image manifest
#   <tag>.sig                          Cosign keyless signature (Rekor logged)
#   <tag>.att                          Cosign attestation (SBOM SPDX-JSON)
#   <tag>.intoto.jsonl                 SLSA L3 provenance attestation
#
# Verify after release:
#   cosign verify ghcr.io/<owner>/cnpg-ha:<tag> \
#     --certificate-identity-regexp "^https://github.com/<owner>/cnpg-ha/" \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
name: image-build-sign

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # ghcr push
      id-token: write       # cosign keyless OIDC
      security-events: write
      attestations: write   # actions/attest-build-provenance
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go (for go.sum check)
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.sum is tidy
        run: |
          go mod tidy -diff

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + OCI labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=cnpg-ha
            org.opencontainers.image.description=Multi-site failover operator for CloudNativePG
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=davidesteban

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: ${{ always() && !github.event.repository.private }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Upload Trivy SARIF (artifact, private-repo fallback)
        if: ${{ always() && github.event.repository.private }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif
          if-no-files-found: ignore

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.7.0

      - name: Cosign sign (keyless, Fulcio + Rekor)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Generate SBOM (SPDX-JSON)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-release-assets: ${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Cosign attest SBOM
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign attest --yes \
              --predicate sbom.spdx.json \
              --type spdxjson \
              "${tag}@${DIGEST}"
          done

  provenance:
    name: SLSA L3 provenance
    needs: [build]
    if: github.event_name != 'pull_request'
    permissions:
      actions: read
      contents: write       # upload provenance to release if on tag
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
