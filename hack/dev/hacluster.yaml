# Test HACluster pointing at the 3-sites.yaml setup.
# Note: site-a is declared primary, site-b/site-c are replicas whose
# kubeconfig Secrets all point at the same KinD (cross-cluster simulation).
apiVersion: ha.cnpg.io/v1alpha1
kind: HACluster
metadata:
  name: prod-db
  namespace: db
spec:
  primary:
    name: site-a
    clusterRef:
      name: pg-prod
      namespace: site-a
  replicas:
    - name: site-b
      kubeconfigSecretRef:
        name: site-b-kubeconfig
        key: kubeconfig
      clusterRef:
        name: pg-prod
        namespace: site-b
    - name: site-c
      kubeconfigSecretRef:
        name: site-c-kubeconfig
        key: kubeconfig
      clusterRef:
        name: pg-prod
        namespace: site-c
  failover:
    mode: Manual
    healthCheckIntervalSeconds: 10
    failureThreshold: 3
    promotionPolicy: MostAdvancedLSN
