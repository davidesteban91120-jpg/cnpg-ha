# ServiceAccount + RBAC + token Secret used to build an "in-cluster"
# kubeconfig that the operator consumes when it runs as a Pod.
# The SA carries only the minimum rights needed to read CNPG Cluster CRs
# cluster-wide (consistent with CONVENTION.md / ARCHITECTURE.md §4.2).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hacluster-remote-reader
  namespace: db
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hacluster-remote-reader
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hacluster-remote-reader
subjects:
  - kind: ServiceAccount
    name: hacluster-remote-reader
    namespace: db
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hacluster-remote-reader
---
# SA-token Secret used to obtain a long-lived token (otherwise K8s >= 1.24
# only issues tokens through TokenRequest — time-bound and awkward to embed
# inside a static kubeconfig).
apiVersion: v1
kind: Secret
metadata:
  name: hacluster-remote-reader-token
  namespace: db
  annotations:
    kubernetes.io/service-account.name: hacluster-remote-reader
type: kubernetes.io/service-account-token
