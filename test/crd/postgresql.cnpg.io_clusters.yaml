# Minimal CNPG Cluster CRD — TEST DOUBLE for envtest only.
#
# cnpg-ha never imports the CloudNativePG module: it reads/patches the
# Cluster CR as unstructured JSON. This fixture lets the envtest API server
# store Cluster CRs so the controller's real reconcile path can be exercised
# without installing the full CloudNativePG operator/CRD.
#
# Differences vs. the real CNPG CRD (intentional, irrelevant to cnpg-ha):
#   - spec/status are open (x-kubernetes-preserve-unknown-fields) instead of
#     a full schema;
#   - no status subresource, so tests can set status inline on create. The
#     operator only READS CNPG status and WRITES spec/metadata, so this does
#     not change the code paths under test.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusters.postgresql.cnpg.io
spec:
  group: postgresql.cnpg.io
  names:
    kind: Cluster
    listKind: ClusterList
    plural: clusters
    singular: cluster
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
