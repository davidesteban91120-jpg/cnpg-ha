# Pre-commit hooks — run locally before every commit and as a safety net in CI.
# Install:  pipx install pre-commit && pre-commit install
# Run all:  pre-commit run --all-files
# Skip one: SKIP=golangci-lint git commit ...
#
# Versions are kept in sync by Renovate (manager: pre-commit).
---
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

repos:
  # Generic hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^charts/.+/templates/.*\.yaml$  # Helm templates aren't valid YAML.
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Go formatting + vet — fast, runs on changed files only.
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet-mod
      - id: go-mod-tidy

  # Full golangci-lint — runs on changed files for speed; CI runs --all.
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.4
    hooks:
      - id: golangci-lint

  # Secret scanning.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Dockerfile lint.
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: [--config, .hadolint.yaml]

  # Helm chart lint (only when chart files change).
  - repo: local
    hooks:
      - id: helm-lint
        name: helm lint
        language: system
        entry: helm lint charts/cnpg-ha --strict
        files: ^charts/cnpg-ha/
        pass_filenames: false
      - id: helm-template-validate
        name: helm template (parse check)
        language: system
        entry: bash -c 'helm template r charts/cnpg-ha >/dev/null'
        files: ^charts/cnpg-ha/
        pass_filenames: false

  # Commit message convention (Conventional Commits) — matches Renovate's
  # semanticCommits preset.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, refactor, test, build, ci, perf, revert, deps]
