{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cnpg-ha.fullname" . }}-allow-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cnpg-ha.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cnpg-ha.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.metricsAllowedNamespaceSelector | nindent 12 }}
          {{- with .Values.networkPolicy.metricsAllowedPodSelector }}
          podSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      ports:
        - port: {{ trimPrefix ":" .Values.metrics.bindAddress | int }}
          protocol: TCP
{{- end }}
