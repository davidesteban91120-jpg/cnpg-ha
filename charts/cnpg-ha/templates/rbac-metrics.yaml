{{- if and .Values.rbac.create .Values.metrics.enabled .Values.metrics.secure -}}
# metrics-auth-role: lets the controller validate scrape requests via
# TokenReview + SubjectAccessReview (controller-runtime metrics filter).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cnpg-ha.fullname" . }}-metrics-auth-role
  labels:
    {{- include "cnpg-ha.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cnpg-ha.fullname" . }}-metrics-auth-rolebinding
  labels:
    {{- include "cnpg-ha.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cnpg-ha.fullname" . }}-metrics-auth-role
subjects:
  - kind: ServiceAccount
    name: {{ include "cnpg-ha.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# metrics-reader: bind to a Prometheus ServiceAccount to grant scrape access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cnpg-ha.fullname" . }}-metrics-reader
  labels:
    {{- include "cnpg-ha.labels" . | nindent 4 }}
rules:
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
{{- end }}
